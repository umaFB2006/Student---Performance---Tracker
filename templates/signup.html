<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:
linear-gradient(rgba(0,0,0,.7),
rgba(0,0,0,.7)),
url("https://images.unsplash.com/photo-1516979187457-637abb4f9353");
background-size:cover;
background-position:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:450px;
border:none;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.4);
animation:slide 1s;
}

@keyframes slide{
from{
transform:translateY(40px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

.theme-btn{
position:absolute;
top:20px;
right:20px;
}

.dark{
background:#1f1f1f;
color:white;
}

</style>

</head>

<body>

<button class="btn btn-light theme-btn"
onclick="toggleTheme()">
🌙 Theme
</button>

<div class="card p-4" id="card">

<h2 class="text-center mb-4">
Create Account
</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}

{% for category,message in messages %}
<div class="alert alert-{{category}}">
{{message}}
</div>
{% endfor %}

{% endif %}
{% endwith %}

<form method="POST">

<div class="mb-3">
<label>Full Name</label>
<input type="text"
name="fullname"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email"
name="email"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password"
name="password"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Confirm Password</label>
<input type="password"
name="confirm_password"
class="form-control"
required>
</div>

<div class="mb-3">

<label>Role</label>

<select name="role"
class="form-control"
required>

<option value="">
Select Role
</option>

<option value="Student">
Student/User
</option>

<option value="Teacher">
Teacher/Admin
</option>

</select>

</div>

<button class="btn btn-success w-100">
Create Account
</button>

</form>

<div class="text-center mt-3">

Already have an account?

<a href="/signin">
Sign In
</a>

</div>

</div>

<script>

function toggleTheme(){

document.getElementById("card")
.classList.toggle("dark");

if(document.getElementById("card")
.classList.contains("dark")){
localStorage.setItem("theme","dark");
}else{
localStorage.setItem("theme","light");
}

}

window.onload=function(){

if(localStorage.getItem("theme")==="dark"){
document.getElementById("card")
.classList.add("dark");
}

}

</script>

</body>
</html>
