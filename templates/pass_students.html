<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Pass Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body{
            background:
            linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
            url("{{ url_for('static', filename='image/books.jpg') }}");

            background-size:cover;
            background-position:center;
            min-height:100vh;
            color:white;
            padding:40px;
        }

        .container-box{
            background:rgba(10,20,40,.9);
            padding:30px;
            border-radius:20px;
            box-shadow:0 8px 20px rgba(0,0,0,.5);
        }

        h2{
            text-align:center;
            margin-bottom:30px;
        }

        table{
            background:white;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="container-box">

        <h2>Pass Students List</h2>

        <table class="table table-bordered table-striped">

            <thead class="table-success">

                <tr>
                    <th>Student Name</th>
                    <th>Roll No</th>
                    <th>Total Marks</th>
                </tr>

            </thead>

            <tbody>

            {% for student in students %}

                <tr>
                    <td>{{ student['student_name'] }}</td>
                    <td>{{ student['rollno'] }}</td>
                    <td>{{ student['total_marks'] }}</td>
                </tr>

            {% endfor %}

            </tbody>

        </table>

        <a href="/dashboard"
        class="btn btn-primary">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
