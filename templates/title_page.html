<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Performance Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --bg:#f4f7fc;
    --text:#222;
    --card:#ffffff;
}

.dark-mode{
    --bg:#121212;
    --text:#ffffff;
    --card:#1f1f1f;
}

body{
    background: linear-gradient(rgba(0,0,0,.6),
    rgba(0,0,0,.6)),
    url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f");
    background-size:cover;
    background-position:center;
    min-height:100vh;
    color:white;
    transition:.3s;
}

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:4rem;
    font-weight:bold;
}

.hero p{
    font-size:1.3rem;
}

.btn-custom{
    padding:12px 30px;
    margin:10px;
    border-radius:30px;
}

.theme-btn{
    position:absolute;
    right:20px;
    top:20px;
}

.fade-in{
    animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>
<body>

<button class="btn btn-light theme-btn" onclick="toggleTheme()">
🌙 Theme
</button>

<section class="hero">

<div class="fade-in">

<h1>📚 Student Performance Tracker</h1>

<p>
Track student grades, monitor performance,
generate report cards and visualize progress.
</p>

<a href="/signup" class="btn btn-success btn-custom">
Create Account
</a>

<a href="/signin" class="btn btn-primary btn-custom">
Sign In
</a>

</div>

</section>

<script>

function toggleTheme(){

document.body.classList.toggle("dark-mode");

if(document.body.classList.contains("dark-mode")){
localStorage.setItem("theme","dark");
}else{
localStorage.setItem("theme","light");
}

}

window.onload=function(){

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark-mode");
}

}

</script>

</body>
</html>
